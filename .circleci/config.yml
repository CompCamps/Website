version: 2
jobs:
  build:
    docker:
      # specify the version you desire here
      - image: circleci/php:latest
      - image: circleci/python:3.6.2

    working_directory: ~/repo

    steps:
      - checkout

      - run: sudo apt update; sudo apt install ruby-sass
      - run: npm install uglify-js -g #TODO install locally and cache the dependency

      # Download and cache dependencies
      - restore_cache:
          keys:
          - v1-dependencies-{{ checksum "composer.json" }}
          # fallback to using the latest cache if no exact match is found
          - v1-dependencies-

      - run: composer install -n --prefer-dist

      - save_cache:
          paths:
            - ./vendor
          key: v1-dependencies-{{ checksum "composer.json" }}

      - run: mkdir www/css
      - run: sass --update resources/www/scss:www/css
      - run: python3.6 build/compile/minify.py

      - run: cp ~/repo ~/build-output -r

      - save_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}
          paths:
            - ~/build-output

  test:
    docker:
      - image: circleci/php:latest
      - image: circleci/python:2.7.12

    working_directory: ~/build-output

    steps:
      - restore_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}
      # run tests!
      - run: php vendor/bin/phpunit --coverage-clover build/coverage/xml

      - run: python2.7 ./build/tests/filenames.py www
      - run: python2.7 ./build/tests/existence.py www
      - run: sh ./build/tests/line-endings.sh

  deploy:
    machine:
      enabled: true
      
    working_directory: ~/build-output

    steps:
      - restore_cache:
          key: v1-repo-{{ .Environment.CIRCLE_SHA1 }}

      - run: scp -r www/* mentor@compcamps.com:/home/mentor/public_html/testing

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - test
          filters:
            branches:
              only: master
